<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Blackout Boys</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="BB Kegeln">
<meta name="theme-color" content="#1a5c2a">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; font-size: 14px; }

  .topbar { background: #fff; border-bottom: 1px solid #e0ddd5; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-title { font-size: 17px; font-weight: 600; }
  .topbar-actions { display: flex; gap: 8px; }
  .btn { padding: 7px 14px; border-radius: 8px; border: 1px solid #d0cdc5; background: #fff; font-size: 13px; cursor: pointer; font-weight: 500; color: #1a1a1a; }
  .btn:active { background: #f0ede8; }
  .btn-danger { border-color: #e0a0a0; color: #c0392b; }
  .btn-danger:active { background: #fdf0f0; }
  .btn-primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .btn-primary:active { background: #333; }

  .tabs { display: flex; gap: 0; background: #fff; border-bottom: 1px solid #e0ddd5; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { padding: 10px 18px; font-size: 13px; font-weight: 500; color: #888; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }

  .page { display: none; padding: 0 0 80px; }
  .page.active { display: block; }

  .section { margin: 16px 12px 0; }
  .section-header { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; padding: 0 4px; }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; border: 1px solid #e0ddd5; background: #fff; }
  table { border-collapse: collapse; min-width: 100%; }
  th, td { border-right: 1px solid #e8e5de; border-bottom: 1px solid #e8e5de; white-space: nowrap; }
  th:last-child, td:last-child { border-right: none; }
  tr:last-child td { border-bottom: none; }

  .th-name { position: sticky; left: 0; z-index: 10; background: #f5f4f0; font-weight: 600; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 12px; min-width: 100px; }
  .th-strafe { text-align: center; padding: 6px 4px 2px; min-width: 70px; max-width: 90px; }
  .th-strafe-name { font-size: 11px; font-weight: 600; color: #1a1a1a; line-height: 1.2; word-break: break-word; white-space: normal; max-width: 80px; display: block; text-align: center; }
  .th-strafe-price { font-size: 11px; color: #888; margin-top: 2px; display: block; text-align: center; }
  .th-total { position: sticky; right: 0; background: #f5f4f0; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 12px; min-width: 72px; text-align: right; }

  .td-name { position: sticky; left: 0; background: #fff; z-index: 5; font-weight: 500; font-size: 14px; padding: 0 12px; height: 44px; min-width: 100px; }
  .td-name-inner { display: flex; align-items: center; gap: 6px; }
  .avatar { width: 26px; height: 26px; border-radius: 50%; background: #e8e5de; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #555; flex-shrink: 0; }

  .td-count { text-align: center; padding: 0; height: 44px; cursor: pointer; user-select: none; position: relative; min-width: 70px; }
  .td-count:active { background: #f0f7ff; }
  .count-inner { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
  .count-num { font-size: 15px; font-weight: 500; color: #1a1a1a; min-width: 20px; text-align: center; }
  .count-num.zero { color: #d0cdc5; }

  .td-total { position: sticky; right: 0; background: #fafaf7; font-weight: 600; font-size: 14px; padding: 0 12px; height: 44px; text-align: right; min-width: 72px; }
  .td-total-inner { display: flex; align-items: center; justify-content: flex-end; height: 100%; }

  .tr-player:nth-child(even) .td-name { background: #fafaf7; }
  .tr-player:nth-child(even) .td-count { background: transparent; }
  .tr-player:nth-child(even) .td-count:active { background: #e8f4ff; }
  .tr-player:nth-child(even) .td-total { background: #f5f4f0; }
  .tr-player.absent-row { opacity: 0.38; }
  .tr-player.absent-row .td-count { pointer-events: none; }
  .da-toggle { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; border: 1px solid; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .da-toggle.is-da { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
  .da-toggle.is-weg { background: #f5f5f5; color: #bbb; border-color: #ddd; }

  .tr-sum .td-name { background: #f0ede8; font-size: 12px; color: #888; font-weight: 600; }
  .tr-sum td { background: #f0ede8; border-top: 2px solid #d0cdc5; }
  .tr-sum .td-total { background: #e8e5de; }
  .tr-sum .count-num { font-size: 12px; font-weight: 600; color: #888; }
  .tr-sum .count-num.zero { color: #ccc; }
  .tr-sum .td-total-inner { font-size: 13px; color: #888; }

  .hint { font-size: 12px; color: #aaa; text-align: center; padding: 10px 16px; }

  .summary-page { padding: 16px 12px 80px; }
  .summary-card { background: #fff; border-radius: 10px; border: 1px solid #e0ddd5; overflow: hidden; margin-bottom: 12px; }
  .summary-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #f0ede8; gap: 10px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row.absent { opacity: 0.45; }
  .summary-name { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 15px; flex: 1; min-width: 0; }
  .summary-detail { font-size: 12px; color: #999; margin-top: 2px; }
  .summary-amount { font-size: 17px; font-weight: 600; white-space: nowrap; }
  .summary-amount.zero { color: #ccc; }
  .summary-amount-sub { font-size: 11px; color: #888; font-weight: 400; display: block; text-align: right; margin-top: 1px; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 6px; background: #fff3cd; color: #856404; font-weight: 600; }
  .anwesend-toggle { flex-shrink: 0; padding: 4px 9px; border-radius: 20px; border: 1px solid; font-size: 11px; font-weight: 600; cursor: pointer; }
  .anwesend-toggle.da { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
  .anwesend-toggle.weg { background: #f5f5f5; color: #aaa; border-color: #ddd; }
  .total-card { background: #1a1a1a; color: #fff; border-radius: 10px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .total-label { font-size: 13px; opacity: 0.7; }
  .total-amount { font-size: 24px; font-weight: 700; }
  .info-card { background: #fff; border-radius: 10px; border: 1px solid #e0ddd5; padding: 14px 16px; margin-bottom: 12px; }
  .info-card-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 1px solid #f5f4f0; }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-size: 14px; color: #444; }
  .info-value { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .absent-card { background: #fff8e1; border-radius: 10px; border: 1px solid #ffe082; padding: 14px 16px; margin-bottom: 12px; }
  .absent-card-title { font-size: 11px; font-weight: 700; color: #b8860b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .absent-amount { font-size: 22px; font-weight: 800; color: #b8860b; margin-bottom: 4px; }
  .absent-explain { font-size: 12px; color: #888; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px 16px 0 0; padding: 20px 20px 40px; width: 100%; max-width: 500px; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
  .modal-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .modal input[type=text], .modal input[type=number] { height: 42px; border: 1px solid #d0cdc5; border-radius: 8px; padding: 0 12px; font-size: 14px; width: 100%; background: #fff; color: #1a1a1a; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .modal-actions .btn { flex: 1; height: 44px; font-size: 15px; }
  .strafe-list-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f0ede8; gap: 8px; }
  .strafe-list-item:last-child { border-bottom: none; }
  .strafe-list-name { flex: 1; font-size: 14px; }
  .strafe-list-price { font-size: 14px; color: #888; width: 60px; text-align: right; }
  .strafe-del { background: none; border: none; color: #c0392b; font-size: 18px; cursor: pointer; padding: 2px 6px; }

  .edit-hint { font-size: 12px; color: #aaa; text-align: center; padding: 4px 0 0; }

  /* Spiele */
  .spiele-page { padding: 16px 12px 80px; }
  .spiel-card { background: #fff; border-radius: 10px; border: 1px solid #e0ddd5; overflow: hidden; margin-bottom: 12px; }
  .spiel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
  .spiel-header:active { background: #f5f4f0; }
  .spiel-title { font-size: 16px; font-weight: 600; }
  .spiel-meta { font-size: 12px; color: #888; margin-top: 2px; }
  .spiel-chevron { font-size: 18px; color: #aaa; transition: transform 0.2s; }
  .spiel-chevron.open { transform: rotate(180deg); }
  .spiel-body { display: none; border-top: 1px solid #f0ede8; padding: 16px; }
  .spiel-body.open { display: block; }
  .score-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f5f4f0; }
  .score-row:last-of-type { border-bottom: none; }
  .score-name { display: flex; align-items: center; gap: 8px; flex: 1; font-size: 14px; font-weight: 500; }
  .score-input { width: 80px; height: 40px; border: 1px solid #d0cdc5; border-radius: 8px; padding: 0 10px; font-size: 16px; font-weight: 600; text-align: center; background: #fff; color: #1a1a1a; }
  .score-input:focus { outline: none; border-color: #888; }
  .score-input.loser { border-color: #e0a0a0; background: #fff5f5; color: #c0392b; }
  .score-input.winner { border-color: #a0c8a0; background: #f5fff5; color: #27ae60; }
  .spiel-actions { display: flex; gap: 8px; margin-top: 14px; }
  .spiel-actions .btn { flex: 1; height: 42px; font-size: 14px; }
  .result-list { margin-top: 14px; }
  .result-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; }
  .result-rank { font-size: 16px; font-weight: 700; width: 28px; text-align: center; color: #888; }
  .result-name { flex: 1; font-size: 14px; font-weight: 500; }
  .result-score { font-size: 16px; font-weight: 700; }
  .result-row.loser { background: #fff0f0; }
  .result-row.loser .result-rank { color: #c0392b; }
  .result-row.loser .result-name { color: #c0392b; }
  .result-row.loser .result-score { color: #c0392b; }
  .result-row.top { background: #f0fff4; }
  .result-row.top .result-rank { color: #27ae60; }
  .loser-badge { font-size: 11px; background: #fde8e8; color: #c0392b; padding: 2px 7px; border-radius: 6px; font-weight: 600; }
  .winner-tag { font-size: 11px; background: #e8fde8; color: #27ae60; padding: 2px 7px; border-radius: 6px; font-weight: 600; }
  .loser-count-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #f0ede8; }
  .loser-count-label { font-size: 13px; color: #555; flex: 1; }
  .stepper { display: flex; align-items: center; gap: 8px; }
  .stepper-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #d0cdc5; background: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #1a1a1a; }
  .stepper-btn:active { background: #f0ede8; }
  .stepper-val { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; }
  .add-game-card { background: #fff; border-radius: 10px; border: 1px dashed #d0cdc5; padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; margin-bottom: 12px; color: #888; font-size: 14px; font-weight: 500; }
  .add-game-card:active { background: #f5f4f0; }
  .spiel-desc { font-size: 13px; color: #555; line-height: 1.55; background: #f5f4f0; border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; border-left: 3px solid #1a5c2a; }
  .team-names-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .team-name-field { display: flex; flex-direction: column; gap: 3px; }
  .team-name-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .team-name-label.t1 { color: #1a6bc0; }
  .team-name-label.t2 { color: #c01a1a; }
  .team-name-input { height: 36px; border: 1.5px solid #d0cdc5; border-radius: 8px; padding: 0 10px; font-size: 14px; font-weight: 600; background: #fff; color: #1a1a1a; }
  .team-name-input.t1 { border-color: #aaccee; background: #f5f9ff; color: #1a6bc0; }
  .team-name-input.t2 { border-color: #eeaaaa; background: #fff5f5; color: #c01a1a; }
  .team-name-input:focus { outline: none; border-color: #888; }

  /* Tannenbaum */
  .tanne-teams { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .tanne-team-col { background: #f5f4f0; border-radius: 8px; padding: 10px; min-height: 60px; }
  .tanne-team-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 8px; }
  .tanne-team1-label { color: #1a6bc0; }
  .tanne-team2-label { color: #c01a1a; }
  .tanne-player-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px 4px 5px; border-radius: 20px; margin: 3px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; }
  .tanne-player-chip:active { opacity: 0.7; }
  .chip-unassigned { background: #e8e5de; color: #555; border-color: #d0cdc5; }
  .chip-team1 { background: #dceeff; color: #1a6bc0; border-color: #aaccee; }
  .chip-team2 { background: #ffdddd; color: #c01a1a; border-color: #eeaaaa; }
  .tanne-setup-hint { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 12px; }
  .tanne-trees { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
  .tanne-tree-wrap { background: #f5f4f0; border-radius: 10px; padding: 10px 6px 14px; }
  .tanne-tree-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; text-align: center; margin-bottom: 10px; }
  .tanne-tree-title.t1 { color: #1a6bc0; }
  .tanne-tree-title.t2 { color: #c01a1a; }
  .tanne-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 4px; }
  .tanne-cell { width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; cursor: pointer; user-select: none; border: 1.5px solid; transition: all 0.1s; }
  .tanne-cell:active { transform: scale(0.92); }
  .tanne-cell.t1-active { background: #dceeff; color: #1a6bc0; border-color: #aaccee; }
  .tanne-cell.t1-done { background: #e8e5de; color: #bbb; border-color: #d0cdc5; text-decoration: line-through; }
  .tanne-cell.t2-active { background: #ffdddd; color: #c01a1a; border-color: #eeaaaa; }
  .tanne-cell.t2-done { background: #e8e5de; color: #bbb; border-color: #d0cdc5; text-decoration: line-through; }
  .tanne-progress { text-align: center; font-size: 12px; color: #888; margin-top: 8px; }
  .tanne-winner-banner { background: #1a1a1a; color: #fff; text-align: center; border-radius: 8px; padding: 10px 14px; margin-top: 12px; font-size: 15px; font-weight: 600; }
  .tanne-players-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0ede8; }

  /* 2x Abräumen */
  .abr-teams { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .abr-team-box { border-radius: 10px; padding: 14px 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; position: relative; }
  .abr-team-box.t1 { background: #dceeff; border: 1.5px solid #aaccee; }
  .abr-team-box.t2 { background: #ffdddd; border: 1.5px solid #eeaaaa; }
  .abr-team-box.done-box { opacity: 0.7; }
  .abr-team-name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  .abr-team-box.t1 .abr-team-name { color: #1a6bc0; }
  .abr-team-box.t2 .abr-team-name { color: #c01a1a; }
  .abr-throws { display: flex; align-items: center; gap: 10px; }
  .abr-throw-num { font-size: 36px; font-weight: 800; line-height: 1; min-width: 48px; text-align: center; color: #1a1a1a; }
  .abr-throw-label { font-size: 11px; color: #888; text-align: center; margin-top: 2px; }
  .abr-btn-throw { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #1a1a1a; background: #1a1a1a; color: #fff; font-size: 26px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .abr-btn-throw:active { transform: scale(0.92); background: #333; }
  .abr-btn-throw.minus { background: transparent; color: #888; border-color: #bbb; font-size: 22px; }
  .abr-btn-throw.minus:active { background: #f0ede8; }
  .abr-milestone-btns { display: flex; flex-direction: column; gap: 6px; width: 100%; }
  .abr-milestone { width: 100%; padding: 10px 8px; border-radius: 8px; border: 1.5px solid; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.1s; }
  .abr-milestone:active { transform: scale(0.97); }
  .abr-milestone.first-inactive { background: transparent; color: #888; border-color: #ccc; }
  .abr-milestone.first-done { background: #fff3cd; color: #856404; border-color: #ffc107; }
  .abr-milestone.second-inactive { background: transparent; color: #888; border-color: #ccc; }
  .abr-milestone.second-done { background: #d4edda; color: #155724; border-color: #28a745; }
  .abr-winner-banner { background: #1a1a1a; color: #fff; text-align: center; border-radius: 8px; padding: 10px 14px; margin-top: 12px; font-size: 15px; font-weight: 600; }
  .abr-crown { font-size: 20px; display: block; margin-bottom: 4px; }

  /* Bis 100 */
  .b100-teams { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0 8px; }
  .b100-team-box { border-radius: 10px; padding: 12px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: background 0.2s; }
  .b100-team-box.t1 { background: #dceeff; border: 1.5px solid #aaccee; }
  .b100-team-box.t2 { background: #ffdddd; border: 1.5px solid #eeaaaa; }
  .b100-team-box.flash-reset { background: #ff4444 !important; border-color: #cc0000 !important; }
  .b100-team-box.won { background: #d4edda; border-color: #28a745; }
  .b100-team-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  .b100-team-box.t1 .b100-team-name { color: #1a6bc0; }
  .b100-team-box.t2 .b100-team-name { color: #c01a1a; }
  .b100-team-box.won .b100-team-name { color: #155724; }
  .b100-score { font-size: 52px; font-weight: 800; line-height: 1; color: #1a1a1a; }
  .b100-team-box.won .b100-score { color: #155724; }
  .b100-score-label { font-size: 11px; color: #888; margin-top: -4px; }
  .b100-stats { display: flex; gap: 12px; }
  .b100-stat { text-align: center; }
  .b100-stat-num { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .b100-stat-label { font-size: 10px; color: #888; line-height: 1.2; }
  .b100-numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; }
  .b100-num-btn { height: 40px; border-radius: 7px; border: 1.5px solid rgba(0,0,0,0.12); background: rgba(255,255,255,0.6); font-size: 16px; font-weight: 700; cursor: pointer; color: #1a1a1a; }
  .b100-num-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.9); }
  .b100-num-btn.disabled { opacity: 0.35; pointer-events: none; }
  .b100-reset-msg { font-size: 12px; font-weight: 700; color: #c0392b; text-align: center; padding: 4px 0; min-height: 20px; }
  .b100-winner-banner { background: #1a1a1a; color: #fff; text-align: center; border-radius: 8px; padding: 10px 14px; margin-top: 12px; font-size: 15px; font-weight: 600; }

  /* Blackjack */
  .bj-player-section { border-bottom: 1px solid #f0ede8; padding: 12px 0; }
  .bj-player-section:last-child { border-bottom: none; padding-bottom: 4px; }
  .bj-player-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .bj-player-name { flex: 1; font-size: 14px; font-weight: 600; }
  .bj-total { font-size: 28px; font-weight: 800; line-height: 1; color: #1a1a1a; min-width: 40px; text-align: right; }
  .bj-total.bust { color: #c0392b; }
  .bj-total.win { color: #27ae60; }
  .bj-status { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; white-space: nowrap; }
  .bj-status.playing { background: #e8f0ff; color: #1a6bc0; }
  .bj-status.done-st { background: #e8f5e9; color: #2e7d32; }
  .bj-status.bust { background: #ffebee; color: #c0392b; }
  .bj-status.win21 { background: #fff3cd; color: #856404; }
  .bj-card-picker { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .bj-card-btn { min-width: 40px; height: 44px; border-radius: 8px; border: 1.5px solid #d0cdc5; background: #fff; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; padding: 2px 6px; gap: 1px; }
  .bj-card-btn:active { background: #f0ede8; }
  .bj-card-btn.selected { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .bj-card-btn.selected:active { background: #333; }
  .bj-card-btn.bj-card-locked { opacity: 0.4; pointer-events: none; }
  .bj-card-btn.bj-card-locked.selected { opacity: 0.75; }
  .bj-card-sub { font-size: 9px; font-weight: 500; opacity: 0.65; }
  .bj-numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 6px 0 5px; }
  .bj-num-btn { height: 42px; border-radius: 8px; border: 1.5px solid #d0cdc5; background: #fff; font-size: 16px; font-weight: 700; cursor: pointer; color: #1a1a1a; }
  .bj-num-btn:active { background: #e8e5de; transform: scale(0.94); }
  .bj-throws-history { font-size: 11px; color: #aaa; text-align: center; padding: 3px 0; letter-spacing: 0.02em; }
  .bj-result-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; margin-bottom: 4px; }
  .bj-result-row.bust-row { background: #fff0f0; }
  .bj-result-row.win-row { background: #f0fff4; }
  .bj-result-row.extra-loser { background: #fff5e5; }
  .bj-result-label { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 6px; white-space: nowrap; }
  .bj-winner-banner { background: #1a1a1a; color: #fff; text-align: center; border-radius: 8px; padding: 10px 14px; margin-top: 12px; font-size: 15px; font-weight: 600; }

  /* Hausnummer 3-digit */
  .hn-legend { font-size: 11px; color: #888; margin-bottom: 12px; padding: 8px 10px; background: #f5f4f0; border-radius: 8px; }
  .hn-inputs { display: flex; align-items: center; gap: 5px; }
  .hn-digit { width: 42px; height: 44px; border-radius: 8px; border: 1.5px solid #d0cdc5; text-align: center; font-size: 20px; font-weight: 800; background: #fff; color: #1a1a1a; -moz-appearance: textfield; }
  .hn-digit::-webkit-outer-spin-button, .hn-digit::-webkit-inner-spin-button { -webkit-appearance: none; }
  .hn-digit:focus { outline: none; border-color: #1a1a1a; }
  .hn-sep { font-size: 18px; font-weight: 300; color: #ccc; }
  .hn-result { font-size: 18px; font-weight: 800; color: #1a5c2a; min-width: 44px; margin-left: 4px; }

  /* Tag-Nacht */
  .tn-player-row { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid #f0ede8; }
  .tn-player-row:last-of-type { border-bottom: none; }
  .tn-player-info { display: flex; align-items: center; gap: 8px; width: 90px; flex-shrink: 0; padding-top: 4px; }
  .tn-player-name { font-size: 12px; font-weight: 600; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tn-inputs { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .tn-group { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .tn-group-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; width: 22px; flex-shrink: 0; }
  .tn-group-label.day  { color: #c8860a; }
  .tn-group-label.night { color: #1a1a6a; }
  .tn-inp { width: 48px; height: 38px; border-radius: 7px; border: 1.5px solid #d0cdc5; text-align: center; font-size: 15px; font-weight: 700; background: #fff; color: #1a1a1a; -moz-appearance: textfield; }
  .tn-inp::-webkit-outer-spin-button, .tn-inp::-webkit-inner-spin-button { -webkit-appearance: none; }
  .tn-inp:focus { outline: none; border-color: #888; }
  .tn-inp.night { background: #1a1a3a; color: #fff; border-color: #1a1a3a; }
  .tn-inp.night3 { background: #000; color: #ffd700; border-color: #000; }
  .tn-mult { font-size: 10px; color: #aaa; font-weight: 600; }
  .tn-total-col { width: 52px; flex-shrink: 0; text-align: right; padding-top: 8px; }
  .tn-total-val { font-size: 22px; font-weight: 800; color: #1a1a1a; line-height: 1; }
  .tn-total-label { font-size: 10px; color: #aaa; }
</style>
</head>
